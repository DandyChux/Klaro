name: Build and Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            version:
                description: "Version type (lite/pro)"
                required: true
                default: "lite"
                type: choice
                options:
                    - lite
                    - pro

jobs:
    build-pro:
        if: github.event_name == 'push' || github.event.inputs.version == 'pro'
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      args: "--target aarch64-apple-darwin"
                      name: "macOS-arm64"
                    - platform: macos-latest
                      args: "--target x86_64-apple-darwin"
                      name: "macOS-x86_64"
                    - platform: "ubuntu-22.04"
                      args: ""
                      name: "Linux-x64"
                    - platform: "windows-latest"
                      args: ""
                      name: "Windows-x64"

        runs-on: ${{ matrix.platform }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Install dependencies (Ubuntu)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install frontend dependencies
              run: bun install

            - name: Download NER model files
              shell: bash
              run: chmod +x download_model.sh && ./download_model.sh

            - name: Build Pro
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: v__VERSION__
                  releaseName: "Klaro v__VERSION__"
                  releaseBody: "See the assets to download this version and install."
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}

    build-lite:
        if: github.event_name == 'push' || github.event.inputs.version == 'lite'
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      args: "--target aarch64-apple-darwin"
                      name: "macOS-arm64"
                    - platform: macos-latest
                      args: "--target x86_64-apple-darwin"
                      name: "macOS-x64"
                    - platform: ubuntu-22.04
                      args: ""
                      name: "Linux-x64"
                    - platform: windows-latest
                      args: ""
                      name: "Windows-x64"

        runs-on: ${{ matrix.platform }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

            - name: Install frontend dependencies
              run: bun install

            - name: Download NER model files
              shell: bash
              run: chmod +x download_model.sh && ./download_model.sh

            - name: Build Lite
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: v__VERSION__-lite
                  releaseName: "Klaro Lite v__VERSION__"
                  releaseBody: "Lite version with limited features."
                  releaseDraft: true
                  prerelease: false
                  args: "-- --no-default-features --features lite-release ${{ matrix.args }}"
